<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>스탑워치</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f0f0f;
      font-family: 'SF Mono', 'Fira Code', monospace;
      color: #fff;
    }

    .container {
      text-align: center;
      padding: 48px;
      background: #1a1a1a;
      border-radius: 24px;
      box-shadow: 0 24px 80px rgba(0,0,0,0.6);
      min-width: 420px;
    }

    .display {
      font-size: 72px;
      font-weight: 200;
      letter-spacing: 4px;
      color: #f0f0f0;
      margin-bottom: 8px;
      tabular-nums: all;
    }

    .display .ms {
      font-size: 40px;
      color: #888;
    }

    .controls {
      display: flex;
      gap: 16px;
      justify-content: center;
      margin: 36px 0 32px;
    }

    button {
      padding: 14px 36px;
      border: none;
      border-radius: 50px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.1s, opacity 0.2s;
      outline: none;
    }

    button:active { transform: scale(0.96); }

    #btn-start {
      background: #22c55e;
      color: #fff;
      min-width: 120px;
    }

    #btn-start.running {
      background: #ef4444;
    }

    #btn-lap {
      background: #3b82f6;
      color: #fff;
    }

    #btn-lap:disabled {
      background: #2a2a2a;
      color: #555;
      cursor: default;
    }

    #btn-reset {
      background: #2a2a2a;
      color: #aaa;
    }

    .laps {
      max-height: 260px;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: #333 transparent;
    }

    .laps::-webkit-scrollbar { width: 4px; }
    .laps::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

    .lap-item {
      display: flex;
      justify-content: space-between;
      padding: 10px 16px;
      border-radius: 8px;
      font-size: 15px;
      color: #ccc;
      transition: background 0.15s;
    }

    .lap-item:nth-child(odd) { background: #222; }

    .lap-item .lap-num { color: #666; font-size: 13px; }
    .lap-item .lap-split { color: #888; font-size: 13px; }
    .lap-item .lap-time { color: #e0e0e0; font-weight: 500; }

    .lap-item.best .lap-time { color: #22c55e; }
    .lap-item.worst .lap-time { color: #ef4444; }
  </style>
</head>
<body>
<div class="container">
  <div class="display">
    <span id="hms">00:00.00</span>
  </div>

  <div class="controls">
    <button id="btn-start">시작</button>
    <button id="btn-lap" disabled>랩</button>
    <button id="btn-reset">초기화</button>
  </div>

  <div class="laps" id="laps"></div>
</div>

<script>
  let startTime = 0;
  let elapsed = 0;
  let timerInterval = null;
  let running = false;
  let laps = [];
  let lastLapElapsed = 0;

  const display = document.getElementById('hms');
  const btnStart = document.getElementById('btn-start');
  const btnLap = document.getElementById('btn-lap');
  const btnReset = document.getElementById('btn-reset');
  const lapsEl = document.getElementById('laps');

  function format(ms) {
    const m = Math.floor(ms / 60000);
    const s = Math.floor((ms % 60000) / 1000);
    const cs = Math.floor((ms % 1000) / 10);
    return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}<span class="ms">.${String(cs).padStart(2,'0')}</span>`;
  }

  function formatPlain(ms) {
    const m = Math.floor(ms / 60000);
    const s = Math.floor((ms % 60000) / 1000);
    const cs = Math.floor((ms % 1000) / 10);
    return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}.${String(cs).padStart(2,'0')}`;
  }

  function tick() {
    elapsed = Date.now() - startTime;
    display.innerHTML = format(elapsed);
  }

  function renderLaps() {
    if (laps.length === 0) { lapsEl.innerHTML = ''; return; }
    const times = laps.map(l => l.split);
    const best = Math.min(...times);
    const worst = Math.max(...times);
    lapsEl.innerHTML = laps.slice().reverse().map(l => {
      let cls = '';
      if (laps.length > 1) {
        if (l.split === best) cls = 'best';
        else if (l.split === worst) cls = 'worst';
      }
      return `<div class="lap-item ${cls}">
        <span class="lap-num">랩 ${l.num}</span>
        <span class="lap-split">${formatPlain(l.split)}</span>
        <span class="lap-time">${formatPlain(l.total)}</span>
      </div>`;
    }).join('');
  }

  btnStart.addEventListener('click', () => {
    if (!running) {
      startTime = Date.now() - elapsed;
      timerInterval = setInterval(tick, 10);
      running = true;
      btnStart.textContent = '정지';
      btnStart.classList.add('running');
      btnLap.disabled = false;
    } else {
      clearInterval(timerInterval);
      running = false;
      btnStart.textContent = '계속';
      btnStart.classList.remove('running');
      btnLap.disabled = true;
    }
  });

  btnLap.addEventListener('click', () => {
    const splitTime = elapsed - lastLapElapsed;
    laps.push({ num: laps.length + 1, split: splitTime, total: elapsed });
    lastLapElapsed = elapsed;
    renderLaps();
  });

  btnReset.addEventListener('click', () => {
    clearInterval(timerInterval);
    running = false;
    elapsed = 0;
    lastLapElapsed = 0;
    laps = [];
    display.innerHTML = format(0);
    btnStart.textContent = '시작';
    btnStart.classList.remove('running');
    btnLap.disabled = true;
    renderLaps();
  });
</script>
</body>
</html>
