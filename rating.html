<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>앱 평가 시스템</title>

  <style>
    /* ── Reset & Base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --primary: #6C63FF;
      --primary-dark: #574FD6;
      --accent: #FF6584;
      --bg: #F4F6FF;
      --surface: #FFFFFF;
      --text: #1A1A2E;
      --text-sub: #6B7280;
      --star-on: #FBBF24;
      --star-off: #E5E7EB;
      --success: #10B981;
      --radius: 16px;
      --shadow: 0 4px 24px rgba(108,99,255,0.12);
      --shadow-sm: 0 2px 8px rgba(0,0,0,0.08);
    }

    html, body {
      height: 100%;
      font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
    }

    .hidden { display: none !important; }

    /* ── Layout ── */
    .screen {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }

    .card {
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 28px 24px;
      width: 100%;
      max-width: 420px;
    }

    /* ── Typography ── */
    h1 { font-size: 1.6rem; font-weight: 800; letter-spacing: -0.5px; }
    h2 { font-size: 1.25rem; font-weight: 700; }
    h3 { font-size: 1rem; font-weight: 700; }
    p  { font-size: 0.9rem; color: var(--text-sub); line-height: 1.5; }

    .badge {
      display: inline-block;
      background: var(--primary);
      color: #fff;
      font-size: 0.7rem;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 99px;
      letter-spacing: 0.5px;
    }

    /* ── Buttons ── */
    .btn {
      display: block;
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.1s, opacity 0.2s;
    }
    .btn:active { transform: scale(0.97); }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-primary:hover { background: var(--primary-dark); }
    .btn-outline {
      background: transparent;
      color: var(--primary);
      border: 2px solid var(--primary);
    }
    .btn-sm {
      width: auto;
      padding: 8px 20px;
      font-size: 0.85rem;
    }
    .btn:disabled { opacity: 0.45; cursor: not-allowed; }

    /* ── Form ── */
    label { display: block; font-size: 0.8rem; font-weight: 600; color: var(--text-sub); margin-bottom: 6px; }
    select, input, textarea {
      width: 100%;
      padding: 12px 14px;
      border: 2px solid #E5E7EB;
      border-radius: 10px;
      font-size: 0.95rem;
      font-family: inherit;
      background: var(--bg);
      color: var(--text);
      transition: border-color 0.2s;
      outline: none;
    }
    select:focus, input:focus, textarea:focus { border-color: var(--primary); }
    textarea { resize: none; height: 72px; line-height: 1.5; }

    /* ── Stars ── */
    .stars {
      display: flex;
      gap: 6px;
      font-size: 2.2rem;
      cursor: pointer;
      user-select: none;
      justify-content: center;
    }
    .star { color: var(--star-off); transition: color 0.15s, transform 0.1s; }
    .star.on { color: var(--star-on); }
    .star:hover { transform: scale(1.15); }
    .star-label {
      text-align: center;
      font-size: 0.8rem;
      color: var(--text-sub);
      margin-top: 4px;
      min-height: 18px;
    }

    /* ── Progress ── */
    .progress-bar {
      width: 100%;
      height: 6px;
      background: #E5E7EB;
      border-radius: 99px;
      overflow: hidden;
      margin-bottom: 20px;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--primary), var(--accent));
      border-radius: 99px;
      transition: width 0.4s ease;
    }

    /* ── App card (participant) ── */
    .app-header {
      display: flex;
      align-items: flex-start;
      gap: 14px;
      margin-bottom: 20px;
    }
    .app-icon {
      width: 56px; height: 56px;
      border-radius: 14px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      display: flex; align-items: center; justify-content: center;
      font-size: 1.6rem;
      flex-shrink: 0;
    }
    .app-meta { flex: 1; }
    .app-meta h2 { margin-bottom: 2px; }
    .app-meta .creator { font-size: 0.8rem; color: var(--text-sub); }
    .app-desc { font-size: 0.85rem; color: var(--text-sub); background: var(--bg); padding: 10px 12px; border-radius: 10px; margin-bottom: 20px; }

    .nav-row { display: flex; gap: 10px; margin-top: 16px; }
    .nav-row .btn { flex: 1; }

    .btn-skip {
      background: #F3F4F6;
      color: var(--text-sub);
      font-size: 0.85rem;
      padding: 10px;
      margin-top: 8px;
      border: 1.5px dashed #D1D5DB;
    }
    .btn-skip:hover { background: #E5E7EB; color: var(--text); }

    .divider {
      height: 1px;
      background: #E5E7EB;
      margin: 20px 0;
    }

    /* ── Success screen ── */
    .success-icon {
      width: 72px; height: 72px;
      background: var(--success);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 2rem;
      margin: 0 auto 16px;
      box-shadow: 0 8px 24px rgba(16,185,129,0.3);
    }

    /* ── Already rated note ── */
    .rated-note {
      display: flex;
      align-items: center;
      gap: 8px;
      background: #F0FDF4;
      border: 1.5px solid #86EFAC;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 0.82rem;
      color: #166534;
      margin-top: 12px;
    }

    /* ═══════════════════════════════
       ADMIN STYLES
    ═══════════════════════════════ */
    #admin-screen {
      align-items: stretch;
      justify-content: flex-start;
      padding: 0;
      min-height: 100vh;
    }

    .admin-header {
      background: linear-gradient(135deg, var(--primary) 0%, #8B5CF6 100%);
      color: #fff;
      padding: 24px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .admin-header h1 { color: #fff; font-size: 1.4rem; }
    .admin-header p  { color: rgba(255,255,255,0.75); font-size: 0.85rem; margin-top: 2px; }
    .live-dot {
      display: flex; align-items: center; gap: 6px;
      font-size: 0.78rem; color: rgba(255,255,255,0.85);
    }
    .live-dot::before {
      content: '';
      width: 8px; height: 8px;
      background: #4ADE80;
      border-radius: 50%;
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .admin-body { padding: 24px 32px; }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 14px;
      margin-bottom: 28px;
    }
    .summary-card {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 18px 20px;
      box-shadow: var(--shadow-sm);
      text-align: center;
    }
    .summary-card .big { font-size: 2rem; font-weight: 800; color: var(--primary); }
    .summary-card .lbl { font-size: 0.78rem; color: var(--text-sub); margin-top: 2px; }

    .section-title {
      font-size: 0.78rem;
      font-weight: 700;
      color: var(--text-sub);
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 14px;
    }

    /* leaderboard */
    .leaderboard { display: flex; flex-direction: column; gap: 12px; }
    .lb-row {
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow-sm);
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      transition: box-shadow 0.2s;
    }
    .lb-row:hover { box-shadow: var(--shadow); }
    .lb-rank {
      font-size: 1.3rem;
      font-weight: 900;
      color: var(--text-sub);
      width: 30px;
      text-align: center;
      flex-shrink: 0;
    }
    .lb-rank.gold   { color: #F59E0B; }
    .lb-rank.silver { color: #9CA3AF; }
    .lb-rank.bronze { color: #B45309; }
    .lb-icon {
      width: 44px; height: 44px;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      display: flex; align-items: center; justify-content: center;
      font-size: 1.2rem;
      flex-shrink: 0;
    }
    .lb-info { flex: 1; min-width: 0; }
    .lb-info h3 { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .lb-info .sub { font-size: 0.78rem; color: var(--text-sub); }
    .lb-score { text-align: right; flex-shrink: 0; }
    .lb-score .avg {
      font-size: 1.3rem; font-weight: 800; color: var(--primary);
      display: flex; align-items: center; gap: 3px;
    }
    .lb-score .cnt { font-size: 0.75rem; color: var(--text-sub); }

    /* star mini */
    .star-mini { color: var(--star-on); font-size: 0.9rem; }

    /* expand comments */
    .comments-toggle {
      background: none; border: none;
      font-size: 0.78rem; color: var(--primary); cursor: pointer;
      font-weight: 600; padding: 2px 0; margin-top: 4px;
      font-family: inherit;
    }
    .comments-panel {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid #E5E7EB;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .comment-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      font-size: 0.82rem;
    }
    .comment-avatar {
      width: 28px; height: 28px;
      border-radius: 50%;
      background: var(--primary);
      color: #fff;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.65rem; font-weight: 800;
      flex-shrink: 0;
    }
    .comment-body { flex: 1; }
    .comment-name { font-weight: 700; color: var(--text); }
    .comment-text { color: var(--text-sub); margin-top: 1px; }
    .comment-stars { color: var(--star-on); font-size: 0.75rem; }

    /* star bar chart */
    .star-dist { margin-top: 10px; }
    .bar-row {
      display: flex; align-items: center; gap: 8px;
      font-size: 0.72rem; color: var(--text-sub); margin-bottom: 4px;
    }
    .bar-track {
      flex: 1; height: 6px;
      background: #E5E7EB; border-radius: 99px; overflow: hidden;
    }
    .bar-fill { height: 100%; background: var(--star-on); border-radius: 99px; }

    /* error banner */
    #error-banner {
      position: fixed; top: 0; left: 0; right: 0;
      background: #FEF2F2; border-bottom: 2px solid #FECACA;
      color: #991B1B; font-size: 0.82rem; font-weight: 600;
      padding: 10px 16px; z-index: 998;
      display: none; line-height: 1.4;
    }
    #error-banner.show { display: block; }

    /* toast */
    #toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      background: #1A1A2E; color: #fff;
      padding: 10px 20px; border-radius: 99px;
      font-size: 0.85rem; font-weight: 600;
      opacity: 0; pointer-events: none;
      transition: opacity 0.3s;
      z-index: 999;
      white-space: nowrap;
    }
    #toast.show { opacity: 1; }

    /* loading */
    .spinner {
      width: 40px; height: 40px;
      border: 4px solid #E5E7EB;
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* responsive admin */
    @media (max-width: 700px) {
      .admin-body { padding: 16px; }
      .admin-header { padding: 18px 16px; flex-direction: column; align-items: flex-start; gap: 8px; }
    }
  </style>
</head>
<body>

<!-- ─────────────────────────────────────────────────

<!-- 1. LOADING -->

<div id="name-screen" class="screen hidden">

<!-- ─────────────────────────────────────────────────
     JAVASCRIPT
───────────────────────────────────────────────── -->
<script>
// ── State ──
let currentUser = null;
let appsToRate = [];
let currentIndex = 0;
let currentRating = 0;
let sessionRatings = {}; // { appId: { rating, comment, ts } }
let adminPollTimer = null;
const STAR_LABELS = ['', '별로예요', '아쉬워요', '보통이에요', '좋아요', '최고예요!'];
const IS_CONFIGURED = () => CONFIG.scriptUrl && !CONFIG.scriptUrl.includes('YOUR_SCRIPT');

// ── Google Apps Script API ──
async function apiCall(params = {}) {
  if (!IS_CONFIGURED()) return { success: false, demo: true };
  try {
    const url = new URL(CONFIG.scriptUrl);
    Object.entries(params).forEach(([k, v]) => url.searchParams.set(k, String(v)));
    const res = await fetch(url.toString(), { redirect: 'follow' });
    const text = await res.text();
    // Apps Script가 HTML 에러 페이지를 반환하면 JSON 파싱 실패 → 원인 안내
    if (text.trim().startsWith('<')) {
      if (text.includes('Sign in') || text.includes('로그인')) {
        return { success: false, error: '⛔ 인증 오류: 배포 설정에서 액세스 권한을 "모든 사용자(익명 포함)"으로 변경하세요.' };
      }
      return { success: false, error: '⛔ Apps Script가 HTML을 반환했습니다. 배포 URL이 맞는지, 재배포를 했는지 확인하세요.' };
    }
    return JSON.parse(text);
  } catch (e) {
    const msg = e.message || '';
    if (msg.includes('Failed to fetch') || msg.includes('NetworkError') || msg.includes('CORS')) {
      return { success: false, error: '⛔ 네트워크/CORS 오류: scriptUrl이 올바른지, 배포가 완료됐는지 확인하세요.' };
    }
    return { success: false, error: e.message };
  }
}

// ── Init ──
function init() {
  document.getElementById('lecture-name-title').textContent = CONFIG.lectureName;
  document.getElementById('admin-lecture-title').textContent = CONFIG.lectureName + ' — 관리자';

  const params = new URLSearchParams(location.search);
  if (params.get('mode') === 'admin') {
    showScreen('admin-login-screen');
    return;
  }
  showNameScreen();
}

// ── Screens ──
function showScreen(id) {
  ['loading-screen','name-screen','rating-screen','success-screen','admin-login-screen','admin-screen']
    .forEach(s => document.getElementById(s).classList.toggle('hidden', s !== id));
}

function showNameScreen() {
  const sel = document.getElementById('participant-select');
  // prevent duplicate options on re-entry
  sel.querySelectorAll('option:not([value=""])').forEach(o => o.remove());
  CONFIG.apps.forEach(a => {
    const opt = document.createElement('option');
    opt.value = a.creator;
    opt.textContent = a.creator + ' (' + a.name + ')';
    sel.appendChild(opt);
  });
  showScreen('name-screen');
}

function startRating() {
  const sel = document.getElementById('participant-select');
  if (!sel.value) { toast('이름을 선택해주세요'); return; }
  currentUser = sel.value;
  appsToRate = CONFIG.apps.filter(a => a.creator !== currentUser);
  currentIndex = 0;
  sessionRatings = {};
  loadUserRatings();
}

async function loadUserRatings() {
  showScreen('loading-screen');
  const result = await apiCall();
  if (result.success && result.data) {
    result.data
      .filter(r => r.rater === currentUser)
      .forEach(r => {
        sessionRatings[r.appId] = { rating: Number(r.rating), comment: r.comment || '', ts: r.timestamp };
      });
  }
  showScreen('rating-screen');
  renderApp();
}

function renderApp() {
  const app = appsToRate[currentIndex];
  const total = appsToRate.length;
  const done = currentIndex + 1;

  document.getElementById('progress-label').textContent = done + ' / ' + total;
  document.getElementById('progress-badge').textContent = app.name;
  document.getElementById('progress-fill').style.width = (done / total * 100) + '%';
  document.getElementById('app-emoji').textContent = app.emoji;
  document.getElementById('app-name').textContent = app.name;
  document.getElementById('app-creator').textContent = '만든이: ' + app.creator;
  document.getElementById('app-desc').textContent = app.desc;
  document.getElementById('comment-input').value = '';
  document.getElementById('already-rated').classList.add('hidden');

  const existing = sessionRatings[app.id];
  if (existing) {
    setStars(existing.rating);
    document.getElementById('comment-input').value = existing.comment || '';
    document.getElementById('already-rated').classList.remove('hidden');
  } else {
    setStars(0);
  }

  document.getElementById('prev-btn').disabled = currentIndex === 0;
  const isLast = currentIndex === total - 1;
  document.getElementById('next-btn').style.display = isLast ? 'none' : 'block';
  document.getElementById('finish-btn').style.display = isLast ? 'block' : 'none';
  document.getElementById('skip-btn').textContent = isLast ? '이 앱 건너뛰고 완료하기 (패스)' : '이 앱 평가 건너뛰기 (패스)';
}

// ── Stars ──
document.getElementById('stars').addEventListener('click', e => {
  const star = e.target.closest('.star');
  if (star) setStars(+star.dataset.v);
});
document.getElementById('stars').addEventListener('mouseover', e => {
  const star = e.target.closest('.star');
  if (star) highlightStars(+star.dataset.v);
});
document.getElementById('stars').addEventListener('mouseleave', () => highlightStars(currentRating));

function setStars(v) {
  currentRating = v;
  highlightStars(v);
  document.getElementById('star-label').textContent = STAR_LABELS[v] || '';
}
function highlightStars(v) {
  document.querySelectorAll('.star').forEach(s => s.classList.toggle('on', +s.dataset.v <= v));
}

// ── Navigate & Save ──
function navigate(dir) {
  const newIdx = currentIndex + dir;
  if (newIdx < 0 || newIdx >= appsToRate.length) return;
  currentIndex = newIdx;
  renderApp();
}

async function saveAndNext() {
  const saved = await saveCurrentRating();
  if (saved === false) return; // user cancelled skip
  currentIndex++;
  renderApp();
}

async function finish() {
  const saved = await saveCurrentRating();
  if (saved === false) return;
  showScreen('success-screen');
}

function skipApp() {
  const isLast = currentIndex >= appsToRate.length - 1;
  if (isLast) {
    showScreen('success-screen');
  } else {
    currentIndex++;
    renderApp();
  }
}

async function saveCurrentRating() {
  if (currentRating === 0) {
    toast('별점을 선택하거나 패스 버튼을 눌러주세요');
    return false;
  }
  const app = appsToRate[currentIndex];
  const comment = document.getElementById('comment-input').value.trim();
  sessionRatings[app.id] = { rating: currentRating, comment, ts: Date.now() };

  const nextBtn = document.getElementById('next-btn');
  const finBtn  = document.getElementById('finish-btn');
  nextBtn.disabled = finBtn.disabled = true;

  const result = await apiCall({ action: 'rate', rater: currentUser, appId: app.id, rating: currentRating, comment });

  nextBtn.disabled = finBtn.disabled = false;

  if (result.demo) {
    toast('⚠️ 데모모드 (scriptUrl 미설정)');
  } else if (result.success) {
    hideErrorBanner();
    toast(result.action === 'updated' ? '수정됨 ✓' : '저장됨 ✓');
  } else {
    const errMsg = result.error || '네트워크 오류';
    toast('저장 실패');
    showErrorBanner(errMsg);
  }
  return true;
}

function resetParticipant() {
  currentUser = null; currentIndex = 0; currentRating = 0; sessionRatings = {};
  document.getElementById('participant-select').value = '';
  showNameScreen();
}

// ── Admin ──
function adminLogin() {
  if (document.getElementById('admin-pw').value === CONFIG.adminPassword) {
    initAdminDashboard();
  } else {
    toast('비밀번호가 틀렸습니다');
    document.getElementById('admin-pw').value = '';
  }
}

function initAdminDashboard() {
  showScreen('admin-screen');
  document.getElementById('stat-apps').textContent = CONFIG.apps.length;
  fetchAndRender();
  // 구글시트는 실시간 스트림 대신 10초 폴링
  clearInterval(adminPollTimer);
  adminPollTimer = setInterval(fetchAndRender, 10000);
}

async function fetchAndRender() {
  const result = await apiCall();
  // flat rows → grouped by appId
  const grouped = {};
  if (result.success && result.data) {
    result.data.forEach(r => {
      if (!grouped[r.appId]) grouped[r.appId] = {};
      grouped[r.appId][r.rater] = {
        rating: Number(r.rating),
        comment: r.comment || '',
        rater: r.rater,
        ts: r.timestamp || 0
      };
    });
  }
  renderDashboard(result.demo ? {} : grouped);
}

function renderDashboard(ratingsData) {
  let totalRatings = 0, totalSum = 0;

  const appStats = CONFIG.apps.map(app => {
    const appRatings = ratingsData[app.id] ? Object.values(ratingsData[app.id]) : [];
    const count = appRatings.length;
    const sum = appRatings.reduce((a, r) => a + r.rating, 0);
    const avg = count ? sum / count : 0;
    totalRatings += count; totalSum += sum;
    return { ...app, ratings: appRatings, count, avg };
  });

  document.getElementById('stat-total-ratings').textContent = totalRatings;
  document.getElementById('stat-avg').textContent = totalRatings ? (totalSum / totalRatings).toFixed(2) : '-';

  appStats.sort((a, b) => b.avg - a.avg || b.count - a.count);

  const lb = document.getElementById('leaderboard');
  if (!appStats.length) { lb.innerHTML = '<p>등록된 앱이 없습니다.</p>'; return; }

  lb.innerHTML = appStats.map((app, i) => {
    const rankClass = ['gold','silver','bronze'][i] || '';
    const rankEmoji = ['🥇','🥈','🥉'][i] || (i + 1) + '';

    const dist = [5,4,3,2,1].map(s => {
      const cnt = app.ratings.filter(r => r.rating === s).length;
      const pct = app.count ? Math.round(cnt / app.count * 100) : 0;
      return `<div class="bar-row"><span>${'★'.repeat(s)}</span><div class="bar-track"><div class="bar-fill" style="width:${pct}%"></div></div><span style="min-width:28px">${cnt}명</span></div>`;
    }).join('');

    const commentItems = app.ratings
      .filter(r => r.comment)
      .sort((a, b) => b.ts - a.ts)
      .map(r => `
        <div class="comment-item">
          <div class="comment-avatar">${(r.rater||'?').slice(0,2)}</div>
          <div class="comment-body">
            <div class="comment-name">${escHtml(r.rater||'익명')} <span class="comment-stars">${'★'.repeat(r.rating)}</span></div>
            <div class="comment-text">${escHtml(r.comment)}</div>
          </div>
        </div>`).join('');

    const panelId = 'panel-' + app.id;
    return `
    <div class="lb-row" style="flex-direction:column;align-items:stretch">
      <div style="display:flex;align-items:center;gap:16px">
        <div class="lb-rank ${rankClass}">${rankEmoji}</div>
        <div class="lb-icon">${app.emoji}</div>
        <div class="lb-info">
          <h3>${escHtml(app.name)}</h3>
          <div class="sub">만든이: ${escHtml(app.creator)}</div>
          <div class="sub" style="margin-top:2px">${escHtml(app.desc)}</div>
        </div>
        <div class="lb-score">
          <div class="avg">${starsHtml(app.avg)} ${app.avg ? app.avg.toFixed(2) : '-'}</div>
          <div class="cnt">${app.count}개 평가</div>
          ${app.count ? `<button class="comments-toggle" onclick="togglePanel('${panelId}')">한줄평 보기 ▾</button>` : ''}
        </div>
      </div>
      ${app.count ? `
      <div class="comments-panel hidden" id="${panelId}">
        <div class="star-dist">${dist}</div>
        ${commentItems ? `<div style="margin-top:12px;font-size:0.78rem;font-weight:700;color:var(--text-sub);letter-spacing:1px;text-transform:uppercase;margin-bottom:8px">한줄평</div>${commentItems}` : '<p style="font-size:0.82rem">아직 한줄평이 없습니다.</p>'}
      </div>` : ''}
    </div>`;
  }).join('');
}

function togglePanel(id) {
  const panel = document.getElementById(id);
  const btn = panel.previousElementSibling.querySelector('.comments-toggle');
  const hidden = panel.classList.toggle('hidden');
  btn.textContent = hidden ? '한줄평 보기 ▾' : '접기 ▴';
}

function starsHtml(avg) {
  const full = Math.floor(avg);
  const half = avg - full >= 0.5;
  let s = '';
  for (let i = 1; i <= 5; i++) {
    if (i <= full) s += '<span class="star-mini">★</span>';
    else if (i === full + 1 && half) s += '<span class="star-mini" style="opacity:0.5">★</span>';
    else s += '<span class="star-mini" style="color:#E5E7EB">★</span>';
  }
  return s;
}

// ── Connection test ──
async function testConnection() {
  const el = document.getElementById('conn-status');
  el.style.display = 'block';
  el.style.background = '#EFF6FF'; el.style.border = '1.5px solid #BFDBFE'; el.style.color = '#1E40AF';
  el.textContent = '⏳ 연결 테스트 중...';

  if (!IS_CONFIGURED()) {
    el.style.background = '#FEF3C7'; el.style.border = '1.5px solid #FDE68A'; el.style.color = '#92400E';
    el.textContent = '⚠️ scriptUrl이 아직 설정되지 않았습니다. rating.html의 CONFIG.scriptUrl을 실제 URL로 교체하세요.';
    return;
  }

  const result = await apiCall({ action: 'ping' });
  if (result.success && result.pong) {
    el.style.background = '#F0FDF4'; el.style.border = '1.5px solid #86EFAC'; el.style.color = '#166534';
    el.textContent = '✅ 연결 성공! Google Sheets와 정상 연결됐습니다. (' + result.time + ')';
  } else {
    el.style.background = '#FEF2F2'; el.style.border = '1.5px solid #FECACA'; el.style.color = '#991B1B';
    el.textContent = '❌ 연결 실패: ' + (result.error || '알 수 없는 오류');
    showErrorBanner(result.error || '알 수 없는 오류');
  }
}

// ── Error banner ──
function showErrorBanner(msg) {
  const el = document.getElementById('error-banner');
  el.textContent = '⚠️ 연결 오류: ' + msg;
  el.classList.add('show');
}
function hideErrorBanner() {
  document.getElementById('error-banner').classList.remove('show');
}

// ── Utils ──
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function toast(msg, duration = 2200) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), duration);
}

// ── Boot ──
init();
</script>
